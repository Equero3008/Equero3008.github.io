<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="description" content="Portfolio und Lebenslauf von Enrico Kleffmann. Physik-Student an der TUM, Entwickler und Maker aus Bochum/München.">
    <meta name="author" content="Enrico Kleffmann">
    <meta name="keywords" content="Enrico Kleffmann, Physik, TUM, Student, Lebenslauf, Portfolio, Embedded Systems, Bochum, München">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Enrico Kleffmann</title>
    <link rel="stylesheet" href="style.css">
    
    <meta name="description" content="Kontaktieren Sie Enrico Kleffmann.">
</head>
<body>

    <nav>
        <a href="index.html">← Zurück zur Übersicht</a>
    </nav>

    <header>
        <h1>Kontakt</h1>
        <p style="color: #666; margin-bottom: 3rem;">
            Ich freue mich über Nachrichten zu Projekten, Kollaborationen oder einfach zum Austausch.
        </p>
    </header>

    <main class="contact-container">
        <form action="https://formsubmit.co/business.enrico.kleffmann@gmail.com" method="POST">
            
            <input type="text" name="_honey" style="display:none">
            
            <input type="hidden" name="_captcha" value="false">
            
            <input type="hidden" name="_next" value="https://Equero3008.github.io/contact.html">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Ihr Name">
            </div>

            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" required placeholder="ihre@email.com">
            </div>

            <div class="form-group">
                <label for="message">Nachricht</label>
                <textarea id="message" name="message" required placeholder="Schreiben Sie hier Ihre Nachricht..."></textarea>
            </div>

            <button type="submit">Nachricht senden</button>
        </form>
    </main>

    <footer style="margin-top: 4rem; font-size: 0.8rem; color: #888; text-align: center;">
        <p>&copy; 2025 Enrico Kleffmann</p>
    </footer>

</body>
</html>
